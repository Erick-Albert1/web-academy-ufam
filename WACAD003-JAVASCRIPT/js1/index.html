<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <title>Gerador de Histórias de Carros</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div>
      <label for="customname">Insira um nome:</label>
      <input id="customname" type="text" placeholder="">
    </div>
    <div>
      <label for="us">EUA</label><input id="us" type="radio" name="ukus" value="us" checked>
      <label for="uk">Reino Unido</label><input id="uk" type="radio" name="ukus" value="uk">
    </div>
    <div>
      <button class="randomize">Gerar história aleatória</button>
    </div>

    <p class="story"></p>

    <script src="main.js"></script>
  </body>
</html>
