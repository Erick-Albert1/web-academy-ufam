<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrutura Semântica HTML5</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        header, nav, main, aside, article, figure, p, section, footer {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        header { background-color: #ff7e8e; height: 60px; }
        nav { background-color: #50e3a4; height: 30px; font-size: 1rem; }
        
        .content-wrapper {
            display: flex;
            gap: 10px;
            height: 350px;
        }
        aside { background-color: #ffd1d6; width: 30%; }
        main { background-color: #d1f0ff; width: 70%; flex-direction: column; padding: 10px; gap: 10px; }
        
        article { background-color: #70d9ff; width: 90%; flex-direction: column; padding: 10px; gap: 10px; }
        figure { background-color: #fff2b2; width: 90%; height: 70px; margin: 0; }
        p { background-color: #e6ffb2; width: 90%; height: 70px; margin: 0; }
        
        section { background-color: #00aaff; width: 90%; height: 50px; color: black; }
        footer { background-color: #b285ff; height: 60px; }
    </style>
</head>
<body>

    <div class="container">
        <header>&lt;header&gt;</header>
        
        <nav>&lt;nav&gt;</nav>

        <div class="content-wrapper">
            <aside>&lt;aside&gt;</aside>
            
            <main>
                &lt;main&gt;
                <article>
                    &lt;article&gt;
                    <figure>&lt;figure&gt;</figure>
                    <p>&lt;p&gt;</p>
                </article>
                <section>&lt;section&gt;</section>
            </main>
        </div>

        <footer>&lt;footer&gt;</footer>
    </div>

</body>
</html>
