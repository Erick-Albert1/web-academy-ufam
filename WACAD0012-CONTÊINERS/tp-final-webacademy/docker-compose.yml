services:
  mysql:
    image: mysql:8.0
    container_name: livraria-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: senhasegura
      MYSQL_DATABASE: livraria
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./bd/script.sql:/docker-entrypoint-initdb.d/script.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psenhasegura"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: livraria-backend
    restart: unless-stopped
    ports:
      - "4444:4444"
    volumes:
      - backend_logs:/app/log
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: livraria-frontend
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: livraria-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  backend_logs:
