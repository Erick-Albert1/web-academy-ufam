<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>
    <div id="app-tarefas">
    <h3>Minhas Tarefas</h3>
    
    <input type="text" id="input-nova-tarefa" placeholder="Digite uma tarefa...">
    <button id="btn-adicionar">Adicionar Tarefa</button>

    <ul id="lista-tarefas">
        <li>Revisar código da aula passada</li>
    </ul>
    </div>

    <script>
        const inputTarefa = document.getElementById('input-nova-tarefa');
        const btnAdicionar = document.getElementById('btn-adicionar');
        const listaUl = document.getElementById('lista-tarefas');

        btnAdicionar.addEventListener('click', function() {
            const textoTarefa = inputTarefa.value;

            if (textoTarefa.trim() === "") {
                alert("Por favor, digite uma tarefa válida!");
                return; 
            }

            const novoItem = document.createElement('li');
            novoItem.innerText = textoTarefa;
            listaUl.appendChild(novoItem);

            inputTarefa.value = "";

            inputTarefa.focus();
        });
    </script>
</body>
</html>
